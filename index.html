<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROBOFRONT · China</title>
<style>
  :root{
    --bg:#070a0f;
    --card:#0c111a;
    --card-edge:rgba(255,255,255,0.06);
    --num:#eef3f8;
    --label:#5b6573;
    --cyan:#3ec8e0;
    --live:#ef4444;
    --hairline:rgba(255,255,255,0.05);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--num);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  .wrap{max-width:680px;margin:0 auto;padding:26px 22px 70px}

  /* live bar */
  .live{
    display:flex;align-items:center;gap:14px;
    font-size:12.5px;letter-spacing:.13em;color:var(--label);
    padding-bottom:26px;border-bottom:1px solid var(--hairline);
  }
  .dot{
    width:11px;height:11px;border-radius:50%;background:var(--live);flex:0 0 auto;
    animation:pulse 2.4s ease-out infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(239,68,68,.55)}
    70%{box-shadow:0 0 0 9px rgba(239,68,68,0)}
    100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}
  }

  /* brand */
  .brand{display:flex;align-items:center;gap:16px;padding:30px 0 4px}
  .logo{
    width:58px;height:58px;border-radius:15px;flex:0 0 auto;
    background:radial-gradient(circle at 38% 35%,#5fe3f4 0%,#16899c 42%,#0a3540 100%);
    position:relative;
    box-shadow:0 0 26px rgba(62,200,224,.25),inset 0 0 14px rgba(0,0,0,.4);
  }
  .logo::after{
    content:"";position:absolute;inset:0;margin:auto;
    width:20px;height:20px;border-radius:50%;
    border:2px solid rgba(239,68,68,.85);
  }
  .brand h1{font-size:30px;font-weight:800;letter-spacing:.01em;line-height:1}
  .brand .sub{font-size:12.5px;letter-spacing:.22em;color:var(--label);margin-top:6px}
  .menu{margin-left:auto;color:var(--num);font-size:22px;line-height:1;opacity:.9}

  /* hero */
  .hero{
    margin:30px 0 26px;padding:26px 22px;
    border:1px solid var(--hairline);border-radius:16px;
    font-size:21px;font-weight:700;
  }

  /* desk card */
  .card{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:18px;
    padding:28px 24px 32px;
  }
  .card-head{
    display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    font-size:12px;letter-spacing:.15em;color:var(--label);margin-bottom:32px;
  }
  .stat{margin-bottom:40px}
  .stat .cap{font-size:12px;letter-spacing:.15em;color:var(--label);margin-bottom:16px}
  .stat .value{
    font-weight:800;line-height:.9;letter-spacing:-.01em;
    font-variant-numeric:tabular-nums;font-feature-settings:"tnum";
  }
  .stat.big .value{font-size:72px}
  .stat.small .value{font-size:50px}

  /* signals */
  .signal{
    border:1px solid var(--hairline);border-radius:14px;
    padding:22px 20px;margin-top:16px;
  }
  .signal .tag{font-size:12px;letter-spacing:.12em;color:var(--cyan);margin-bottom:14px}
  .signal .text{font-size:20px;font-weight:700;line-height:1.32}

  @media (max-width:430px){
    .stat.big .value{font-size:60px}
    .stat.small .value{font-size:44px}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="live mono" id="liveBar">LIVE FROM SHENZHEN</div>

  <div class="brand">
    <div class="logo" aria-hidden="true"></div>
    <div>
      <h1>ROBOFRONT</h1>
      <div class="sub mono">CHINA</div>
    </div>
    <div class="menu mono" aria-hidden="true">&#9776;</div>
  </div>

  <div class="hero">Read the latest field report</div>

  <div class="card">
    <div class="card-head mono">
      <span>TODAY ON THE DESK</span>
      <span id="updated">UPDATED —</span>
    </div>

    <div class="stat big">
      <div class="cap mono">TRACKED DEPLOYMENTS</div>
      <div class="value mono" id="deployments" data-dur="2000">0</div>
    </div>

    <div class="stat small">
      <div class="cap mono">REPORTS THIS WEEK</div>
      <div class="value mono" id="reports" data-dur="1100">0</div>
    </div>
  </div>

  <div id="signals"></div>

</div>

<script src="data.js"></script>
<script>
(function(){
  var D = window.ROBOFRONT_DATA || {};
  var reduce = window.matchMedia &&
    window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // --- static text ---
  if(D.location) document.getElementById('liveBar').textContent = D.location;
  if(D.updated)  document.getElementById('updated').textContent = D.updated;

  // --- signals ---
  var sigWrap = document.getElementById('signals');
  (D.signals || []).forEach(function(s){
    var card = document.createElement('div');
    card.className = 'signal';
    var tag = document.createElement('div');
    tag.className = 'tag mono';
    tag.textContent = s.tag || '';
    var text = document.createElement('div');
    text.className = 'text';
    text.textContent = s.text || '';
    card.appendChild(tag); card.appendChild(text);
    sigWrap.appendChild(card);
  });

  // --- count-up ---
  function ease(t){ return t===1 ? 1 : 1 - Math.pow(2, -10*t); }
  function run(el, target){
    var dur = parseInt(el.getAttribute('data-dur'),10) || 1800;
    if(reduce){ el.textContent = target.toLocaleString('en-US'); return; }
    var start=null;
    function step(ts){
      if(start===null) start=ts;
      var p=Math.min((ts-start)/dur,1);
      el.textContent = Math.round(target*ease(p)).toLocaleString('en-US');
      if(p<1) requestAnimationFrame(step);
      else el.textContent = target.toLocaleString('en-US');
    }
    requestAnimationFrame(step);
  }

  var items = [
    { el: document.getElementById('deployments'), val: D.deployments || 0 },
    { el: document.getElementById('reports'),     val: D.reports || 0 }
  ];

  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          var m = items.find(function(i){ return i.el === e.target; });
          if(m) run(m.el, m.val);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.4 });
    items.forEach(function(i){ io.observe(i.el); });
  } else {
    items.forEach(function(i){ run(i.el, i.val); });
  }
})();
</script>
</body>
</html>
